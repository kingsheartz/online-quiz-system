<!doctype html>
<html>
  <head>
    <title>Admin Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>

  <body>
    <div class="container mt-5">
      <h1>Admin Dashboard</h1>

      <a href="/add-question" class="btn btn-primary mb-4"> Add Question </a>

      <table class="table table-bordered">
        <tr>
          <th>ID</th>
          <th>Question</th>
          <th>Actions</th>
        </tr>

        {% for q in questions %}

        <tr>
          <td>{{ q[0] }}</td>

          <td>{{ q[1] }}</td>

          <td>
            <a href="/edit-question/{{ q[0] }}" class="btn btn-warning btn-sm"> Edit </a>

            <a href="/delete-question/{{ q[0] }}" class="btn btn-danger btn-sm"> Delete </a>
          </td>
        </tr>

        {% endfor %}
      </table>
    </div>
  </body>
</html>
