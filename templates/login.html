{% extends "base.html" %}
{% block title %}Login — QuizMaster{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="card auth-card animate-in">
    <h1>Welcome Back</h1>
    <p class="auth-subtitle">Sign in to your QuizMaster account</p>
    <form method="POST" id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" name="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <div class="form-group">
        <label style="display:flex; align-items:center; gap:8px; text-transform:none; letter-spacing:0; cursor:pointer;">
          <input type="checkbox" name="remember" style="accent-color:var(--accent); width:16px; height:16px;">
          Remember me for 7 days
        </label>
      </div>
      <button type="submit" class="btn btn-primary w-full btn-lg">Sign In</button>
    </form>
    <p class="auth-divider">Don't have an account?</p>
    <a href="{{ url_for('register') }}" class="btn btn-secondary w-full">Create Student Account</a>
  </div>
</div>
{% endblock %}
