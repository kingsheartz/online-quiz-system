<!doctype html>
<html>
  <head>
    <title>Quiz</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>

  <script>

    let timeLeft = 60;

    let timer = setInterval(function() {

        document.getElementById("timer").innerHTML = timeLeft;

        timeLeft--;

        if(timeLeft < 0) {

            clearInterval(timer);

            alert("Time Up!");

            document.getElementById("quizForm").submit();
        }

    }, 1000);
  </script>

  <body>
    <div class="container mt-5">
      <h2>Quiz Questions</h2>

      <div class="alert alert-warning text-center">
        Time Left:
        <span id="timer">60</span> seconds
      </div>

      <form method="POST" action="/submit-quiz" id="quizForm">
        {% for q in questions %}

        <div class="card p-3 mt-3">
          <h5>{{ q[1] }}</h5>

          <input type="radio" name="{{ q[0] }}" value="{{ q[2] }}" />
          {{ q[2] }}

          <br />

          <input type="radio" name="{{ q[0] }}" value="{{ q[3] }}" />
          {{ q[3] }}

          <br />

          <input type="radio" name="{{ q[0] }}" value="{{ q[4] }}" />
          {{ q[4] }}

          <br />

          <input type="radio" name="{{ q[0] }}" value="{{ q[5] }}" />
          {{ q[5] }}
        </div>

        {% endfor %}

        <button class="btn btn-success mt-4">Submit Quiz</button>
      </form>
    </div>
  </body>
</html>
