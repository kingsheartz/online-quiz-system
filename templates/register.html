{% extends "base.html" %}
{% block title %}Register — QuizMaster{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="card auth-card animate-in">
    <h1>Create Account</h1>
    <p class="auth-subtitle">Join QuizMaster as a student and start learning</p>
    <form method="POST" id="register-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" name="name" id="name" class="form-control" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" name="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" class="form-control" placeholder="Create a strong password" required minlength="4">
      </div>
      <button type="submit" class="btn btn-primary w-full btn-lg">Create Account</button>
    </form>
    <p class="auth-divider">Already have an account?</p>
    <a href="{{ url_for('login') }}" class="btn btn-secondary w-full">Sign In</a>
  </div>
</div>
{% endblock %}
